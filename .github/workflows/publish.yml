name: Publish to npm

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) exige npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # Com Trusted Publisher configurado no npmjs.com, o publish usa OIDC
      # (sem token) e gera o provenance statement automaticamente
      - run: npm publish
