name: Publish to npm

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # With a Trusted Publisher configured on npmjs.com, publish uses OIDC
      # (no token) and generates the provenance statement automatically
      - run: npm publish
